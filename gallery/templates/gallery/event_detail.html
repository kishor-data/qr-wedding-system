<!DOCTYPE html>
<html>
<head>
    <title>{{ event.event_name }}</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #fdf6f0;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #c94f7c;
        }

        .qr-box {
            margin-top: 20px;
        }

        .upload-box {
            background: white;
            padding: 20px;
            border-radius: 15px;
            width: 300px;
            margin: 20px auto;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .image-card {
            background: white;
            padding: 12px;
            border-radius: 15px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
            transition: 0.3s ease;
        }

        .image-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        img {
            width: 100%;
            border-radius: 12px;
        }

        /* PREMIUM BUTTON STYLE */

        button {
            background: linear-gradient(45deg, #c94f7c, #ff7aa2);
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 10px;
            font-weight: bold;
            transition: 0.3s ease;
        }

        button:hover {
            transform: scale(1.08);
            box-shadow: 0 8px 20px rgba(0,0,0,0.25);
        }

        a {
            text-decoration: none;
        }

        .back-link {
            display: inline-block;
            margin-top: 30px;
            color: #c94f7c;
            font-weight: bold;
        }

    </style>
</head>

<body>

    <h1>{{ event.event_name }}</h1>
    <p>Date: {{ event.event_date }}</p>

    {% if event.qr_code %}
        <div class="qr-box">
            <h3>Event QR Code</h3>
            <img src="{{ event.qr_code.url }}" width="180">
        </div>
    {% endif %}

    <div class="upload-box">
        <h3>Upload Your Photo</h3>
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <input type="file" name="image" required><br><br>
            <button type="submit">Upload</button>
        </form>
    </div>

    <h2>Event Gallery</h2>

    <div class="gallery">
        {% for image in event.images.all %}
            <div class="image-card">
                <img src="{{ image.image.url }}">
                <a href="{{ image.image.url }}" download>
                    <button>Download</button>
                </a>
            </div>
        {% empty %}
            <p>No images uploaded yet.</p>
        {% endfor %}
    </div>

    <a href="/" class="back-link">← Back to Events</a>

</body>
</html>
