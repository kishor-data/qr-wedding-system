<!DOCTYPE html>
<html>
<head>
    <title>Wedding QR Poster</title>
    <style>
        body {
            text-align: center;
            font-family: Arial, sans-serif;
            background: #fdf6f0;
            padding: 60px;
        }

        .poster {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            display: inline-block;
        }

        h1 {
            color: #c94f7c;
            font-size: 40px;
        }

        h2 {
            color: #555;
        }

        img {
            width: 300px;
            margin-top: 20px;
        }

        p {
            font-size: 20px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="poster">
        <h1>💍 Pavan Wedding 💍</h1>
        <h2>Scan to View & Share Photos</h2>

        <img src="event_1_qr.png">

        <p>Upload & Download Memories Instantly 📸</p>
    </div>

</body>
</html>
